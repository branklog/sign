<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업 등록</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#111;
  color:#fff;
}

header{
  width:100%;
  height:90px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 50px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
}

.logo-text span{
  color:#d60000;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:40px;
}

h1{
  font-size:48px;
  margin-bottom:40px;
}

h1 span{
  color:#ff2a2a;
}

.input-group{
  margin-bottom:24px;
}

label{
  display:block;
  margin-bottom:12px;
  font-weight:700;
}

input,
select,
textarea{
  width:100%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
  padding:18px;
  color:#fff;
  font-size:15px;
  outline:none;
}

textarea{
  min-height:140px;
}

.preview{
  margin-top:18px;
  width:100%;
  max-height:400px;
  object-fit:contain;
  border-radius:18px;
  display:none;
}

button{
  width:100%;
  height:64px;
  border:none;
  border-radius:16px;
  background:#d60000;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

</style>
</head>
<body>


<header>

  <div class="header-left">

    <img
      src="dagil-logo.png"
      alt="대길간판 로고"
      class="company-logo"
    >

    <div class="logo-text">
      WORK<span>BOARD</span>
    </div>

  </div>

</header>


<div class="container">

  <div class="card">

    <h1>
      <span>작업 등록</span>
    </h1>

    <div class="input-group">
      <label>의뢰일</label>
      <input type="date" id="date">
    </div>

    <div class="input-group">
      <label>구분</label>
      <select id="category">
        <option>디자인</option>
        <option>간판</option>
        <option>현수막</option>
        <option>시트지</option>
        <option>배너</option>
      </select>
    </div>

    <div class="input-group">
      <label>업체명</label>
      <input type="text" id="company">
    </div>

    <div class="input-group">
      <label>작업내용</label>
      <input type="text" id="title">
    </div>

    <div class="input-group">
      <label>상태</label>
      <select id="status">
        <option value="design">디자인중</option>
        <option value="modify">수정중</option>
        <option value="wait">대기중</option>
        <option value="done">완료</option>
      </select>
    </div>

    <div class="input-group">
      <label>메모</label>
      <textarea id="memo"></textarea>
    </div>

    <div class="input-group">
      <label>작업 수정 이미지 업로드</label>
      <input
        type="file"
        id="imageInput"
        accept="image/*"
      >

      <img
        id="preview"
        class="preview"
      >
    </div>

    <button onclick="saveWork()">
      작업 저장
    </button>

  </div>

</div>

<script>

let imageData = '';

document
.getElementById('imageInput')
.addEventListener('change', function(e){

  const file = e.target.files[0];

  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(event){

    imageData = event.target.result;

    const preview =
    document.getElementById('preview');

    preview.src = imageData;

    preview.style.display = 'block';

  }

  reader.readAsDataURL(file);

});

function saveWork(){

  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  const company = document.getElementById('company').value;
  const title = document.getElementById('title').value;
  const status = document.getElementById('status').value;
  const memo = document.getElementById('memo').value;

  if(!date || !title){
    alert('날짜와 작업내용을 입력해주세요.');
    return;
  }

  let data =
  JSON.parse(localStorage.getItem('signWorkData')) || {};

  if(!data[date]){
    data[date] = [];
  }

  data[date].push({
    category,
    company,
    title,
    status,
    memo,
    image:imageData
  });

  localStorage.setItem(
    'signWorkData',
    JSON.stringify(data)
  );

  alert('작업이 저장되었습니다.');

}

</script>

</body>
</html>
