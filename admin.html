<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업 등록</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#f5f5f7;
  padding:40px 20px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

h1{
  margin-bottom:30px;
  color:#7d1aa8;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  margin-bottom:10px;
  font-weight:700;
}

input,
select,
textarea{
  width:100%;
  padding:16px;
  border:1px solid #ddd;
  border-radius:14px;
  font-size:15px;
}

textarea{
  min-height:120px;
}

button{
  width:100%;
  height:60px;
  border:none;
  border-radius:16px;
  background:#7d1aa8;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

  <div class="card">

    <h1>작업 등록</h1>

    <div class="input-group">
      <label>의뢰일</label>
      <input type="date" id="date">
    </div>

    <div class="input-group">
      <label>구분</label>
      <select id="category">
        <option>디자인</option>
        <option>간판</option>
        <option>현수막</option>
        <option>시트지</option>
        <option>실사출력</option>
        <option>아크릴</option>
        <option>배너</option>
        <option>명함</option>
      </select>
    </div>

    <div class="input-group">
      <label>업체명</label>
      <input type="text" id="company">
    </div>

    <div class="input-group">
      <label>작업내용</label>
      <input type="text" id="title">
    </div>

    <div class="input-group">
      <label>상태</label>
      <select id="status">
        <option value="design">디자인중</option>
        <option value="modify">수정중</option>
        <option value="wait">대기중</option>
        <option value="done">완료</option>
      </select>
    </div>

    <div class="input-group">
      <label>메모</label>
      <textarea id="memo"></textarea>
    </div>

    <button onclick="saveWork()">
      작업 저장
    </button>

  </div>

</div>

<script>
function saveWork(){

  const date = document.getElementById('date').value;
  const category = document.getElementById('category').value;
  const company = document.getElementById('company').value;
  const title = document.getElementById('title').value;
  const status = document.getElementById('status').value;
  const memo = document.getElementById('memo').value;

  if(!date || !title){
    alert('날짜와 작업내용을 입력해주세요.');
    return;
  }

  let data = JSON.parse(localStorage.getItem('signWorkData')) || {};

  if(!data[date]){
    data[date] = [];
  }

  data[date].push({
    category,
    company,
    title,
    status,
    memo
  });

  localStorage.setItem('signWorkData', JSON.stringify(data));

  alert('작업이 저장되었습니다.');

  document.getElementById('company').value = '';
  document.getElementById('title').value = '';
  document.getElementById('memo').value = '';

}
</script>

</body>
</html>
