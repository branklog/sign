<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>월별 작업내역</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#111;
  color:#fff;
}

header{
  width:100%;
  height:90px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 50px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
  text-decoration:none;
}

.logo-text span{
  color:#d60000;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:80px 20px;
}

.page-title{
  font-size:54px;
  font-weight:900;
  margin-bottom:30px;
}

.page-title span{
  color:#ff2a2a;
}

.home-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  height:54px;
  padding:0 26px;
  border-radius:14px;
  background:#d60000;
  color:#fff;
  text-decoration:none;
  font-weight:800;
  margin-bottom:40px;
}

.card{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:24px;
  padding:30px;
  margin-bottom:24px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:20px;
}

.left{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.date{
  color:#ff2a2a;
  font-weight:700;
}

.company{
  font-size:24px;
  font-weight:900;
}

.category{
  color:#bbb;
  font-size:14px;
}

.work-title{
  color:#fff;
  font-size:18px;
}

.badge{
  padding:9px 16px;
  border-radius:30px;
  font-size:13px;
  font-weight:800;
}

.design{
  background:#16394a;
  color:#7fd8ff;
}

.modify{
  background:#4b3c13;
  color:#ffd95b;
}

.wait{
  background:#4b1f1f;
  color:#ff7b7b;
}

.done{
  background:#17381f;
  color:#74ff9f;
}

.memo{
  margin-top:18px;
  background:rgba(255,255,255,0.06);
  border-radius:16px;
  padding:18px;
  line-height:1.8;
  color:#ddd;
}

.work-image{
  width:100%;
  margin-top:18px;
  border-radius:18px;
}

.empty{
  background:rgba(255,255,255,0.08);
  border-radius:24px;
  padding:70px;
  text-align:center;
}

@media(max-width:768px){

  header{
    padding:0 20px;
  }

  .company-logo{
    height:44px;
  }

  .logo-text{
    font-size:26px;
  }

  .page-title{
    font-size:38px;
  }

  .top{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>
<body>

<header>

  <div class="header-left">

    <img
      src="dagil-logo.png"
      alt="대길간판 로고"
      class="company-logo"
    >

    <a href="index.html" class="logo-text">
      WORK<span>BOARD</span>
    </a>

  </div>

</header>

<div class="container">

  <div class="page-title">
    <span id="monthTitle"></span>
  </div>

  <a href="index.html" class="home-btn">
    홈으로 돌아가기
  </a>

  <div id="result"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const month = params.get('month');

document.getElementById('monthTitle').innerText =
month + ' 작업내역';

const data =
JSON.parse(localStorage.getItem('signWorkData')) || {};

const result =
document.getElementById('result');

let html = '';

let found = false;

for(const date in data){

  if(date.startsWith(month)){

    found = true;

    data[date].forEach(item => {

      html += `

      <div class="card">

        <div class="top">

          <div class="left">

            <div class="date">
              ${date}
            </div>

            <div class="company">
              ${item.company}
            </div>

            <div class="category">
              ${item.category}
            </div>

            <div class="work-title">
              ${item.title}
            </div>

          </div>

          <div class="badge ${item.status}">

            ${

              item.status === 'design'
              ? '디자인중'
              : item.status === 'modify'
              ? '수정중'
              : item.status === 'wait'
              ? '대기중'
              : '완료'

            }

          </div>

        </div>

        ${

          item.memo
          ? `<div class="memo">${item.memo}</div>`
          : ''

        }

        ${

          item.image
          ? `<img src="${item.image}" class="work-image">`
          : ''

        }

      </div>

      `;

    })

  }

}

if(!found){

  html = `
    <div class="empty">
      해당 월의 작업내역이 없습니다.
    </div>
  `;

}

result.innerHTML = html;

</script>

</body>
</html>
