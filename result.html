<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>작업 조회</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:#111;color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.logo-text{font-size:34px;font-weight:900;color:#111;text-decoration:none;}
.logo-text span{color:#d60000;}
.container{max-width:1200px;margin:auto;padding:80px 20px;}
.home-btn{display:inline-flex;background:#d60000;color:#fff;padding:14px 24px;border-radius:14px;text-decoration:none;margin-bottom:24px;}
.card{background:rgba(255,255,255,.08);padding:28px;border-radius:24px;margin-bottom:20px;border:1px solid rgba(255,255,255,.08);}
.badge{display:inline-flex;padding:8px 16px;border-radius:999px;font-size:13px;font-weight:800;}
.done{background:#17381f;color:#74ff9f;}
.progress{background:#4b3c13;color:#ffd95b;}
.pending{background:#4b1f1f;color:#ff7b7b;}
.image-list{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.work-image{width:100px;height:100px;object-fit:cover;border-radius:12px;cursor:pointer;}
.viewer{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;}
.viewer img{max-width:92%;max-height:92%;border-radius:18px;}
</style>
</head>
<body>

<header>
<a href="index.html" class="logo-text">WORK<span>BOARD</span></a>
</header>

<div class="container">

<a href="index.html" class="home-btn">
홈으로 가기
</a>

<div id="result"></div>

</div>

<div class="viewer" id="viewer">
<img id="viewerImg">
</div>

<script>

const params=new URLSearchParams(location.search);

const mode=params.get('mode');

const value=params.get('value');

const data=JSON.parse(localStorage.getItem('dagilWorkData'))||{};

const result=document.getElementById('result');

let html='';

for(const date in data){

let match=false;

if(mode==='day' && date===value)match=true;

if(mode==='month' && date.startsWith(value))match=true;

if(mode==='year' && date.startsWith(value))match=true;

if(match){

data[date].forEach(item=>{

let imgs='';

if(item.images && item.images.length){

imgs+='<div class="image-list">';

item.images.forEach(img=>{

imgs+=`
<img
src="${img}"
class="work-image"
onclick="openViewer('${img}')"
>
`;

});

imgs+='</div>';

}

html+=`
<div class="card">

<div style="color:#ff6666;margin-bottom:10px;">
${date}
</div>

<div style="font-size:24px;font-weight:900;margin-bottom:10px;">
${item.title}
</div>

<div style="margin-bottom:14px;">
${item.category}
</div>

<div class="badge ${item.status}">

${

item.status==='done'
?'완료'
:item.status==='progress'
?'진행중'
:'미완료'

}

</div>

<div style="margin-top:16px;line-height:1.8;">
${item.memo||''}
</div>

${imgs}

</div>
`;

});

}

}

if(!html){

html=`
<div class="card">
조회 결과가 없습니다.
</div>
`;

}

result.innerHTML=html;

function openViewer(src){

document.getElementById('viewer').style.display='flex';

document.getElementById('viewerImg').src=src;

}

document.getElementById('viewer').onclick=function(){

this.style.display='none';

}

</script>

</body>
</html>
