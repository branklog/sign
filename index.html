<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>대길간판 작업관리 시스템</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#f5f5f7;
  overflow-x:hidden;
}

header{
  width:100%;
  height:90px;
  background:#ffffff;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 50px;
  border-bottom:1px solid #ececec;
  position:relative;
  z-index:10;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
  object-fit:contain;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
  letter-spacing:-1px;
}

.logo-text span{
  color:#d60000;
}

.menu{
  display:flex;
  gap:36px;
}

.menu a{
  text-decoration:none;
  color:#222;
  font-size:15px;
  font-weight:700;
  transition:.2s;
}

.menu a:hover{
  color:#d60000;
}

.hero{
  width:100%;
  min-height:calc(100vh - 90px);

  background:
  linear-gradient(
    rgba(0,0,0,0.58),
    rgba(0,0,0,0.58)
  ),
  url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

  position:relative;
}

.content{
  max-width:1200px;
  margin:auto;
  padding:140px 20px;
  color:#fff;
}

.sub-text{
  font-size:22px;
  font-weight:500;
  margin-bottom:18px;
  color:#f0f0f0;
}

.main-title{
  font-size:68px;
  line-height:1.25;
  font-weight:900;
  margin-bottom:28px;
  letter-spacing:-3px;
}

.main-title span{
  color:#ff2a2a;
}

.desc{
  font-size:20px;
  line-height:1.9;
  color:#f1f1f1;
  max-width:820px;
  margin-bottom:48px;
}

.search-wrap{
  display:flex;
  gap:14px;
  max-width:760px;
}

.search-wrap input{
  flex:1;
  height:72px;
  border:none;
  border-radius:16px;
  padding:0 24px;
  font-size:17px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(10px);
  outline:none;
}

.search-wrap input::-webkit-calendar-picker-indicator{
  filter:invert(1);
}

.search-wrap button{
  width:190px;
  border:none;
  border-radius:16px;
  background:#d60000;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
  transition:.2s;
}

.search-wrap button:hover{
  background:#ff1d1d;
}

.info-box{
  margin-top:44px;
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}

.info-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.08);
  padding:18px 22px;
  border-radius:16px;
  color:#fff;
  font-size:14px;
  backdrop-filter:blur(8px);
}

@media(max-width:768px){

  header{
    padding:20px;
    height:auto;
    flex-direction:column;
    align-items:flex-start;
    gap:18px;
  }

  .menu{
    flex-wrap:wrap;
    gap:18px;
  }

  .company-logo{
    height:44px;
  }

  .logo-text{
    font-size:28px;
  }

  .content{
    padding:90px 20px;
  }

  .main-title{
    font-size:42px;
    line-height:1.4;
  }

  .desc{
    font-size:16px;
  }

  .search-wrap{
    flex-direction:column;
  }

  .search-wrap button{
    width:100%;
    height:68px;
  }

}

</style>
</head>
<body>

<header>

  <div class="header-left">

    <img
      src="dagil-logo.png"
      alt="대길간판 로고"
      class="company-logo"
    >

    <div class="logo-text">
      WORK<span>BOARD</span>
    </div>

  </div>

  <nav class="menu">

    <a href="admin.html">작업 등록</a>
    <a href="#">디자인 관리</a>
    <a href="#">업무 현황</a>
    <a href="#">작업 메모</a>
    <a href="#">진행 상태</a>

  </nav>

</header>

<section class="hero">

  <div class="content">

    <div class="sub-text">
      대길간판 작업관리 시스템
    </div>

    <div class="main-title">
      <span>디자인 작업관리 시스템</span><br>
      실시간 업무 진행 현황 관리
    </div>

    <div class="desc">
      날짜를 검색하면 해당 날짜의
      디자인 작업, 수정 진행상황,
      업무 메모 및 완료 여부를
      한눈에 확인할 수 있습니다.
    </div>

    <div class="search-wrap">

      <input
        type="date"
        id="dateInput"
      >

      <button onclick="searchDate()">
        작업 조회
      </button>

    </div>

    <div class="info-box">

      <div class="info-card">
        ✔ 디자인 작업 및 일정 관리
      </div>

      <div class="info-card">
        ✔ 수정 진행 및 업무 상태 확인
      </div>

      <div class="info-card">
        ✔ 작업 메모 및 진행 내역 관리
      </div>

    </div>

  </div>

</section>

<script>

function searchDate(){

  const date = document
    .getElementById('dateInput')
    .value
    .trim();

  if(!date){

    alert('날짜를 선택해주세요.');

    return;

  }

  window.location.href =
    'result.html?date=' + encodeURIComponent(date);

}

</script>

</body>
</html>
