<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대길간판 WORKBOARD</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Pretendard',sans-serif;}
body{background:#111;color:#fff;}
header{height:90px;background:#fff;display:flex;align-items:center;padding:0 40px;}
.header-left{display:flex;align-items:center;gap:18px;}
.company-logo{height:54px;}
.logo-text{font-size:34px;font-weight:900;color:#111;text-decoration:none;}
.logo-text span{color:#d60000;}
.hero{
min-height:calc(100vh - 90px);
background:
linear-gradient(rgba(0,0,0,.68),rgba(0,0,0,.68)),
url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop');
background-size:cover;
background-position:center;
}
.container{max-width:1200px;margin:auto;padding:120px 20px;}
.title{font-size:64px;font-weight:900;line-height:1.2;margin-bottom:24px;}
.title span{color:#ff2a2a;}
.desc{font-size:20px;line-height:1.8;margin-bottom:50px;color:#ddd;}
.box{background:rgba(255,255,255,.08);padding:28px;border-radius:24px;margin-bottom:24px;border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);}
.row{display:flex;gap:14px;margin-top:18px;}
input{flex:1;height:64px;border:none;border-radius:14px;padding:0 20px;background:rgba(255,255,255,.12);color:#fff;}
button{width:180px;border:none;border-radius:14px;background:#d60000;color:#fff;font-weight:800;}
</style>
</head>
<body>

<header>
<div class="header-left">
<img src="dagil-logo.png" class="company-logo">
<a href="index.html" class="logo-text">WORK<span>BOARD</span></a>
</div>
</header>

<section class="hero">
<div class="container">

<div class="title">
<span>통합 작업 조회</span><br>
대길간판 WORKBOARD
</div>

<div class="desc">
일별 · 월별 · 년도별 작업 조회를 지원합니다.
</div>

<div class="box">
<h2>일별 조회</h2>
<div class="row">
<input type="date">
<button>조회</button>
</div>
</div>

<div class="box">
<h2>월별 조회</h2>
<div class="row">
<input type="month">
<button>조회</button>
</div>
</div>

<div class="box">
<h2>년도별 조회</h2>
<div class="row">
<input type="number" placeholder="2026">
<button>조회</button>
</div>
</div>

</div>
</section>
</body>
</html>
