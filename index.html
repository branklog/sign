<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대길간판 작업관리 시스템</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Pretendard', sans-serif;
}

body{
  background:#111;
  color:#fff;
  overflow-x:hidden;
}

header{
  width:100%;
  height:90px;
  background:#fff;
  display:flex;
  align-items:center;
  padding:0 50px;
}

.header-left{
  display:flex;
  align-items:center;
  gap:18px;
}

.company-logo{
  height:54px;
}

.logo-text{
  font-size:34px;
  font-weight:900;
  color:#111;
  text-decoration:none;
}

.logo-text span{
  color:#d60000;
}

.hero{

  width:100%;
  min-height:calc(100vh - 90px);

  background:
  linear-gradient(
    rgba(0,0,0,0.62),
    rgba(0,0,0,0.62)
  ),
  url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1920&auto=format&fit=crop');

  background-size:cover;
  background-position:center;

}

.content{
  max-width:1200px;
  margin:auto;
  padding:140px 20px;
}

.sub-text{
  font-size:22px;
  margin-bottom:18px;
}

.main-title{
  font-size:68px;
  line-height:1.25;
  font-weight:900;
  margin-bottom:28px;
}

.main-title span{
  color:#ff2a2a;
}

.desc{
  font-size:20px;
  line-height:1.9;
  color:#f1f1f1;
  max-width:850px;
  margin-bottom:48px;
}

.search-wrap{
  display:flex;
  gap:14px;
  max-width:760px;
}

.search-wrap input{
  flex:1;
  height:72px;
  border:none;
  border-radius:16px;
  padding:0 24px;
  font-size:17px;
  background:rgba(255,255,255,0.14);
  color:#fff;
  outline:none;
}

.search-wrap input::-webkit-calendar-picker-indicator{
  filter:invert(1);
}

.search-wrap button{
  width:220px;
  border:none;
  border-radius:16px;
  background:#d60000;
  color:#fff;
  font-size:17px;
  font-weight:800;
  cursor:pointer;
}

@media(max-width:768px){

  header{
    padding:0 20px;
  }

  .company-logo{
    height:44px;
  }

  .logo-text{
    font-size:26px;
  }

  .content{
    padding:90px 20px;
  }

  .main-title{
    font-size:42px;
  }

  .desc{
    font-size:16px;
  }

  .search-wrap{
    flex-direction:column;
  }

  .search-wrap button{
    width:100%;
    height:68px;
  }

}

</style>
</head>
<body>

<header>

  <div class="header-left">

    <img
      src="dagil-logo.png"
      alt="대길간판 로고"
      class="company-logo"
    >

    <a href="index.html" class="logo-text">
      WORK<span>BOARD</span>
    </a>

  </div>

</header>

<section class="hero">

  <div class="content">

    <div class="sub-text">
      대길간판 작업관리 시스템
    </div>

    <div class="main-title">
      <span>월별 작업내역 조회 시스템</span><br>
      실시간 업무 진행 현황 관리
    </div>

    <div class="desc">
      년도와 월을 선택하면 해당 월의
      전체 디자인 작업 내역 및
      진행상황을 한번에 확인할 수 있습니다.
    </div>

    <div class="search-wrap">

      <input
        type="month"
        id="monthInput"
      >

      <button onclick="searchMonth()">
        월별 작업 조회
      </button>

    </div>

  </div>

</section>

<script>

function searchMonth(){

  const month = document
    .getElementById('monthInput')
    .value
    .trim();

  if(!month){
    alert('월을 선택해주세요.');
    return;
  }

  window.location.href =
  'result.html?month=' + encodeURIComponent(month);

}

</script>

</body>
</html>
